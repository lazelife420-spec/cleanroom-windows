name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (default: brand.APP_VERSION)'
        required: false
        default: ''

concurrency:
  group: release-dry-run
  cancel-in-progress: true

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  dry-run:
    name: Release Dry Run
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Configure Tcl/Tk for GUI tests
        shell: pwsh
        run: |
          "TCL_LIBRARY=$env:pythonLocation\tcl\tcl8.6" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TK_LIBRARY=$env:pythonLocation\tcl\tk8.6" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(python -c "import brand; print(brand.APP_VERSION)")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Dry-run release for Cleanroom v$VERSION"

      - name: Verify release surface and tag alignment
        run: python scripts/verify_release_surface.py --tag "v${{ steps.ver.outputs.version }}"

      - name: Run full test suite
        run: python -m pytest tests/ -p no:xonsh -q

      - name: Build portable exe
        run: powershell -NoProfile -ExecutionPolicy Bypass -File build_exe.ps1

      - name: Install Inno Setup
        run: |
          winget install --id JRSoftware.InnoSetup --exact --silent --accept-package-agreements --accept-source-agreements

      - name: Build installer
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File build_installer.ps1 -Version "${{ steps.ver.outputs.version }}"

      - name: Optional code signing
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: ./scripts/sign_release_artifacts.ps1

      - name: Generate demo Proof Pack
        run: python scripts/generate_demo_proof_pack.py

      - name: Capture launch screenshots
        continue-on-error: true
        run: python scripts/capture_launch_screenshots.py

      - name: Validate screenshots
        run: python scripts/verify_release_surface.py --tag "v${{ steps.ver.outputs.version }}"

      - name: Generate SHA256SUMS
        run: python scripts/generate_sha256sums.py --version "${{ steps.ver.outputs.version }}"

      - name: Verify checksums and tag alignment
        run: |
          python scripts/verify_release_surface.py --verify-checksums --verify-artifacts --tag "v${{ steps.ver.outputs.version }}" --version "${{ steps.ver.outputs.version }}"

      - name: Attest release artifact provenance (dry run)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/Cleanroom-Setup-${{ steps.ver.outputs.version }}.exe
            SHA256SUMS.txt
            assets/screenshots/cleanroom-review.png
            assets/screenshots/cleanroom-activity-ledger.png
            assets/screenshots/cleanroom-proof-pack-demo.png

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-v${{ steps.ver.outputs.version }}
          path: |
            dist/Cleanroom/**
            dist/Cleanroom-Setup-*.exe
            SHA256SUMS.txt
            assets/screenshots/cleanroom-review.png
            assets/screenshots/cleanroom-activity-ledger.png
            assets/screenshots/cleanroom-proof-pack-demo.png
            docs/demo/cleanroom-proof-pack-demo.html
          if-no-files-found: error

      - name: Dry-run summary
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          echo "## Release dry-run passed for v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Attestable artifacts:" >> "$GITHUB_STEP_SUMMARY"
          echo "- dist/Cleanroom-Setup-${VERSION}.exe" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA256SUMS.txt" >> "$GITHUB_STEP_SUMMARY"
          echo "- assets/screenshots/*.png" >> "$GITHUB_STEP_SUMMARY"
          echo "- docs/demo/cleanroom-proof-pack-demo.html" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No GitHub Release was created. Tag v${VERSION} when ready." >> "$GITHUB_STEP_SUMMARY"
