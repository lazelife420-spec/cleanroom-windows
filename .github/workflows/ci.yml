name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: CI / tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Configure Tcl/Tk for GUI tests
        shell: pwsh
        run: |
          "TCL_LIBRARY=$env:pythonLocation\tcl\tcl8.6" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TK_LIBRARY=$env:pythonLocation\tcl\tk8.6" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -p no:xonsh -q

  public-surface:
    name: CI / public-surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Brand and release surface scan
        run: python scripts/verify_release_surface.py

  migration:
    name: CI / migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Migration receipt tests
        run: python -m pytest tests/test_brand.py -p no:xonsh -q
