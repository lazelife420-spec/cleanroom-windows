name: Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-release.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Configure Tcl/Tk for GUI tests
        shell: pwsh
        run: |
          "TCL_LIBRARY=$env:pythonLocation\tcl\tcl8.6" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TK_LIBRARY=$env:pythonLocation\tcl\tk8.6" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag ${GITHUB_REF_NAME} -> v$VERSION"

      - name: Verify tag matches brand and release notes
        run: python scripts/verify_release_surface.py --tag "${{ github.ref_name }}"

      - name: Run full test suite
        run: python -m pytest tests/ -p no:xonsh -q

      - name: Build portable exe
        run: powershell -NoProfile -ExecutionPolicy Bypass -File build_exe.ps1

      - name: Install Inno Setup
        run: |
          winget install --id JRSoftware.InnoSetup --exact --silent --accept-package-agreements --accept-source-agreements

      - name: Build installer from tag
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File build_installer.ps1 -Version "${{ steps.ver.outputs.version }}"

      - name: Optional code signing
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if ($env:SIGNING_CERT_BASE64) {
            Write-Host 'Signing release artifacts.'
          } else {
            Write-Host '::notice::Unsigned release - set SIGNING_CERT_BASE64 to enable code signing.'
          }
          ./scripts/sign_release_artifacts.ps1

      - name: Generate demo Proof Pack
        run: python scripts/generate_demo_proof_pack.py

      - name: Capture launch screenshots
        continue-on-error: true
        timeout-minutes: 10
        run: python scripts/capture_launch_screenshots.py

      - name: Validate release surface and screenshots
        run: python scripts/verify_release_surface.py --tag "${{ github.ref_name }}"

      - name: Generate SHA256SUMS from build artifacts
        run: python scripts/generate_sha256sums.py --version "${{ steps.ver.outputs.version }}"

      - name: Verify checksums and tag alignment
        run: |
          python scripts/verify_release_surface.py --verify-checksums --verify-artifacts --tag "${{ github.ref_name }}" --version "${{ steps.ver.outputs.version }}"

      - name: Attest release artifact provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/Cleanroom-Setup-${{ steps.ver.outputs.version }}.exe
            SHA256SUMS.txt
            assets/screenshots/cleanroom-review.png
            assets/screenshots/cleanroom-activity-ledger.png
            assets/screenshots/cleanroom-proof-pack-demo.png

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.ver.outputs.version }}"
          NOTES="docs/RELEASE-v${VERSION}.md"
          INSTALLER="dist/Cleanroom-Setup-${VERSION}.exe"

          if [[ ! -f "$INSTALLER" ]]; then
            echo "Installer not found: $INSTALLER"
            exit 1
          fi

          ASSETS=(
            "$INSTALLER"
            SHA256SUMS.txt
            assets/screenshots/cleanroom-review.png
            assets/screenshots/cleanroom-activity-ledger.png
            assets/screenshots/cleanroom-proof-pack-demo.png
            docs/demo/cleanroom-proof-pack-demo.html
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Cleanroom v${VERSION} — Proof-first Windows cleanup with rollback" --notes-file "$NOTES"
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
            echo "Updated existing release $TAG with tag-built artifacts."
          else
            gh release create "$TAG" \
              --title "Cleanroom v${VERSION} — Proof-first Windows cleanup with rollback" \
              --notes-file "$NOTES" \
              "${ASSETS[@]}"
            echo "Created release $TAG from tag commit."
          fi
